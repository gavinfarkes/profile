<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- Top Navbar -->
<div class="navbar">
  <h2>BaseballGram</h2>
</div>

<!-- Profile Header -->
<div class="profile-header">
  <div class="avatar"></div>

  <div class="profile-info">
    <div class="top-row">
      <h2>yourname</h2>
      <div class="commit-circle">D1</div>
    </div>

    <div class="stats">
      <span><b>12</b> posts</span>
      <span><b>1.2k</b> followers</span>
      <span><b>350</b> following</span>
    </div>

    <div class="bio">
      <p><b>Your Name</b></p>
      <p>Position | Height | Weight</p>
      <p>School • City, State</p>
    </div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="active">Posts</button>
  <button onclick="location.href='tagged.html'">Tagged</button>
</div>

<!-- Posts Grid -->
<div class="grid">
  <div class="grid-item"></div>
  <div class="grid-item"></div>
  <div class="grid-item"></div>
</div>

<!-- Videos Section -->
<div class="videos">
  <h3>Highlight Videos</h3>
  <video controls src="video1.mp4"></video>
  <video controls src="video2.mp4"></video>
  <a href="rankings.html" class="button">Rankings - Click Here</a>
</div>

</body>
</html>
